kind = "web"
previewPath = "/"
title = "Sleep Solutions India"
version = "1.0.0"
id = "artifacts/sleep-solutions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22934

[services.development]
run = "pnpm --filter @workspace/sleep-solutions run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sleep-solutions", "run", "build" ]
publicDir = "artifacts/sleep-solutions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22934"
BASE_PATH = "/"
